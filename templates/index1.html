<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        .navbar-custom {
            background-color: #28a745;
            color: white;
        }
        .footer-custom {
            background-color: #28a745;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
            left: 0;
        }
        .container {
            margin-top: 50px;
            margin-bottom: 30px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom">
        <div class="container">
            <a class="navbar-brand text-white" href="#">
                <i class="fas fa-leaf"></i> Plantex
            </a>
            <div class="ml-auto">
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h2 class="text-center mt-4">Crop Recommendation</h2>
        <p class="text-muted text-center">Enter the required values to get the best crop recommendation.</p>
        
        <div class="form-card mx-auto" style="max-width: 500px;">
            <form action="/recommend_crop" method="post">
                <div class="mb-3">
                    <label class="form-label">Nitrogen (N)</label>
                    <input type="number" name="N" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phosphorus (P)</label>
                    <input type="number" name="P" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Potassium (K)</label>
                    <input type="number" name="K" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Temperature (°C)</label>
                    <input type="number" step="0.1" name="temperature" class="form-control" value="{{ temperature }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Humidity (%)</label>
                    <input type="number" step="0.1" name="humidity" class="form-control" value="{{ humidity }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">pH Level</label>
                    <input type="number" step="0.1" name="ph" class="form-control" value="{{ ph }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Rainfall (mm)</label>
                    <input type="number" step="0.1" name="rainfall" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Recommend Crop</button>
            </form>
        </div>
    </div>
    
    <footer class="footer-custom mt-4">
        <b>Plantex - Smart Agriculture Solutions</b>
    </footer>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>

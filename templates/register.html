<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Plantex</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #40916c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.28);
        }
        .brand-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
        .brand-logo i { color: #2d6a4f; font-size: 1.9rem; }
        .brand-logo span { font-size: 1.8rem; font-weight: 700; color: #1b4332; letter-spacing: -0.5px; }
        .brand-tagline { text-align: center; color: #868e96; font-size: 0.82rem; margin-bottom: 28px; }
        .form-label { font-size: 0.85rem; color: #495057; font-weight: 500; margin-bottom: 6px; }
        .input-group-text {
            background: #f8f9fa;
            border: 1.5px solid #dee2e6;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #868e96;
        }
        .form-control {
            border-radius: 0 10px 10px 0;
            padding: 11px 14px;
            border: 1.5px solid #dee2e6;
            border-left: none;
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #52b788;
            box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
        }
        .input-group:focus-within .input-group-text {
            border-color: #52b788;
        }
        .btn-primary-green {
            background: linear-gradient(135deg, #2d6a4f, #52b788);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 0.92rem;
            letter-spacing: 0.3px;
            transition: all 0.25s;
        }
        .btn-primary-green:hover {
            background: linear-gradient(135deg, #1b4332, #2d6a4f);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(45,106,79,0.35);
        }
        .divider { text-align: center; color: #ced4da; font-size: 0.8rem; margin: 18px 0; }
        .bottom-link { text-align: center; font-size: 0.86rem; color: #6c757d; }
        .bottom-link a { color: #2d6a4f; font-weight: 600; text-decoration: none; }
        .bottom-link a:hover { text-decoration: underline; }
        .alert { border-radius: 10px; font-size: 0.86rem; padding: 10px 14px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand-logo">
            <i class="fas fa-seedling"></i>
            <span>Plantex</span>
        </div>
        <p class="brand-tagline">Create your free account</p>

        {% if error %}
        <div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope fa-sm"></i></span>
                    <input type="email" name="usermaild" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user fa-sm"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock fa-sm"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-green w-100">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>
        <div class="divider">— or —</div>
        <p class="bottom-link">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
</body>
</html>
